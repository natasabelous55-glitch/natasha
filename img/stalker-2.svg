<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2b3c2a"/>
      <stop offset="60%" stop-color="#5a6a4a"/>
      <stop offset="100%" stop-color="#8a9070"/>
    </linearGradient>
    <linearGradient id="ground2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3a2a"/>
      <stop offset="100%" stop-color="#1a1812"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="500" fill="url(#sky2)"/>
  <rect y="500" width="1280" height="220" fill="url(#ground2)"/>

  <!-- Далекий ліс -->
  <g fill="#1a2218" opacity="0.8">
    <path d="M 0 490 Q 150 470 300 480 Q 450 475 600 485 Q 750 478 900 488 Q 1050 480 1200 485 L 1280 490 L 1280 510 L 0 510 Z"/>
  </g>

  <!-- Багатоповерхівки радянські -->
  <g fill="#6a6a5a" opacity="0.9">
    <rect x="80" y="320" width="100" height="180" stroke="#2a2620" stroke-width="1"/>
    <rect x="200" y="300" width="80" height="200" stroke="#2a2620" stroke-width="1"/>
    <rect x="1050" y="330" width="90" height="170" stroke="#2a2620" stroke-width="1"/>
    <rect x="1160" y="310" width="100" height="190" stroke="#2a2620" stroke-width="1"/>
  </g>
  <!-- Вікна -->
  <g fill="#1a1612">
    <!-- Будівля 1 -->
    <g transform="translate(80 320)">
      <rect x="10" y="15" width="8" height="12"/><rect x="25" y="15" width="8" height="12"/><rect x="40" y="15" width="8" height="12"/><rect x="55" y="15" width="8" height="12"/><rect x="70" y="15" width="8" height="12"/><rect x="85" y="15" width="8" height="12"/>
      <rect x="10" y="40" width="8" height="12"/><rect x="25" y="40" width="8" height="12"/><rect x="40" y="40" width="8" height="12"/><rect x="55" y="40" width="8" height="12"/><rect x="70" y="40" width="8" height="12"/><rect x="85" y="40" width="8" height="12"/>
      <rect x="10" y="65" width="8" height="12"/><rect x="40" y="65" width="8" height="12"/><rect x="70" y="65" width="8" height="12"/>
      <rect x="10" y="90" width="8" height="12"/><rect x="25" y="90" width="8" height="12"/><rect x="55" y="90" width="8" height="12"/><rect x="85" y="90" width="8" height="12"/>
      <rect x="10" y="115" width="8" height="12"/><rect x="40" y="115" width="8" height="12"/><rect x="70" y="115" width="8" height="12"/>
      <rect x="25" y="140" width="8" height="12"/><rect x="55" y="140" width="8" height="12"/>
    </g>
    <g transform="translate(200 300)">
      <rect x="8" y="15" width="7" height="10"/><rect x="22" y="15" width="7" height="10"/><rect x="36" y="15" width="7" height="10"/><rect x="50" y="15" width="7" height="10"/><rect x="64" y="15" width="7" height="10"/>
      <rect x="8" y="35" width="7" height="10"/><rect x="36" y="35" width="7" height="10"/><rect x="64" y="35" width="7" height="10"/>
      <rect x="22" y="55" width="7" height="10"/><rect x="50" y="55" width="7" height="10"/>
      <rect x="8" y="75" width="7" height="10"/><rect x="36" y="75" width="7" height="10"/><rect x="64" y="75" width="7" height="10"/>
      <rect x="22" y="95" width="7" height="10"/><rect x="50" y="95" width="7" height="10"/>
      <rect x="8" y="115" width="7" height="10"/><rect x="36" y="115" width="7" height="10"/>
    </g>
  </g>

  <!-- КОЛЕСО ОГЛЯДУ ПРИП'ЯТІ — центральний елемент -->
  <g transform="translate(640 350)" stroke="#d4b070" fill="none" stroke-width="2">
    <!-- Опори -->
    <line x1="-80" y1="180" x2="-20" y2="0" stroke="#3a3028" stroke-width="4"/>
    <line x1="80" y1="180" x2="20" y2="0" stroke="#3a3028" stroke-width="4"/>
    <line x1="0" y1="0" x2="0" y2="180" stroke="#3a3028" stroke-width="3"/>
    <!-- Колесо -->
    <circle cx="0" cy="0" r="140" stroke="#d4b070" stroke-width="3"/>
    <circle cx="0" cy="0" r="115" stroke="#d4b070" stroke-width="1.5" opacity="0.7"/>
    <!-- Спиці -->
    <line x1="-140" y1="0" x2="140" y2="0" stroke-width="1.5"/>
    <line x1="0" y1="-140" x2="0" y2="140" stroke-width="1.5"/>
    <line x1="-99" y1="-99" x2="99" y2="99" stroke-width="1.5"/>
    <line x1="-99" y1="99" x2="99" y2="-99" stroke-width="1.5"/>
    <line x1="-130" y1="-52" x2="130" y2="52" stroke-width="1"/>
    <line x1="-52" y1="-130" x2="52" y2="130" stroke-width="1"/>
    <line x1="-52" y1="130" x2="52" y2="-130" stroke-width="1"/>
    <line x1="-130" y1="52" x2="130" y2="-52" stroke-width="1"/>
    <!-- Кабіни — деякі відсутні -->
    <g fill="#d4b070" stroke="none">
      <rect x="-8" y="132" width="16" height="14" rx="2"/>
      <rect x="93" y="87" width="14" height="16" rx="2"/>
      <rect x="-106" y="-10" width="14" height="16" rx="2" opacity="0.5"/>
      <rect x="-8" y="-148" width="16" height="14" rx="2" opacity="0.3"/>
    </g>
    <!-- Центр -->
    <circle cx="0" cy="0" r="10" fill="#3a3028"/>
  </g>

  <!-- Земля трава -->
  <g fill="#3a4028" opacity="0.6">
    <path d="M 0 500 Q 200 495 400 500 Q 600 498 800 502 Q 1000 500 1200 498 L 1280 500 L 1280 520 L 0 520 Z"/>
  </g>

  <!-- Туман/серпанок -->
  <rect y="460" width="1280" height="60" fill="#6a6a5a" opacity="0.3"/>
</svg>
